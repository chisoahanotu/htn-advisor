name: Deploy moving-sale to GitHub Pages

on:
  push:
    branches: [main]
    paths: ['moving-sale/**', '.github/workflows/deploy-pages.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: moving-sale/package-lock.json
      - name: Build
        working-directory: moving-sale
        env:
          # Client config lives in the committed moving-sale/.env.production
          # (public values; RLS enforces security). Do NOT export empty VITE_*
          # vars here — an empty env var overrides the .env file and silently
          # produces a mock-mode build.
          VITE_BASE: ${{ vars.VITE_BASE || '/' }}
        run: |
          npm ci
          npm run build
          # SPA fallback: unknown paths serve the app shell
          cp dist/index.html dist/404.html
          # Custom domain — must match Settings -> Pages -> Custom domain
          echo "${{ vars.PAGES_CUSTOM_DOMAIN || 'avalonestatesale.com' }}" > dist/CNAME
          # Keep the legacy hypertension app reachable at /htn/
          cp -r ../htn dist/htn
      - name: Ensure Pages builds from this workflow (not the legacy branch build)
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.request('PUT /repos/{owner}/{repo}/pages', {
                owner: context.repo.owner,
                repo: context.repo.repo,
                build_type: 'workflow',
              })
              core.info('Pages build_type set to workflow')
            } catch (e) {
              core.warning(`Could not update Pages config (${e.status}): ${e.message}`)
            }
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: moving-sale/dist
      - id: deployment
        uses: actions/deploy-pages@v4
